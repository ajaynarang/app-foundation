# .github/workflows/ci.yml
# Runs on every push to main and every PR targeting it.
# Blocks merge if lint, type-check, test, or build fails.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Formatting gate (fast — fails early if Prettier drift)
  # ─────────────────────────────────────────────────────────────
  format:
    name: Formatting — Prettier
    runs-on: ubuntu-latest # runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  # ─────────────────────────────────────────────────────────────
  # Backend CI
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Type-check, Test, Build
    runs-on: ubuntu-latest # runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter=shared-types build

      - name: Generate Prisma client
        run: pnpm --filter @appshore/db prisma:generate

      - name: Lint
        run: pnpm --filter=backend lint

      - name: Schema lint (ID + naming convention)
        run: pnpm --filter=backend lint:schema

      - name: Type-check
        run: pnpm --filter=backend exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter=backend test

      - name: RBAC gap audit
        run: npx tsx tests/scripts/audit-rbac-gaps.ts --ci
        continue-on-error: true

      - name: Build (verify compilation)
        run: pnpm --filter=shared-types build && pnpm --filter=backend build

  # ─────────────────────────────────────────────────────────────
  # Web CI
  # ─────────────────────────────────────────────────────────────
  web:
    name: Web — Lint, Type-check, Build
    runs-on: ubuntu-latest # runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter=shared-types build

      - name: Generate Prisma client
        run: pnpm --filter @appshore/db prisma:generate

      - name: Lint
        run: pnpm --filter=@app/web lint

      - name: Type-check
        run: pnpm --filter=@app/web type-check

      - name: Build (verify compilation)
        run: pnpm --filter=@app/web build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCI-PLACEHOLDER-KEY
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000'

  # ─────────────────────────────────────────────────────────────
  # Console CI
  # ─────────────────────────────────────────────────────────────
  console:
    name: Console — Lint, Type-check, Build
    runs-on: ubuntu-latest # runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter=shared-types build

      - name: Lint
        run: pnpm --filter=@app/console lint

      - name: Type-check
        run: pnpm --filter=@app/console type-check

      - name: Build (verify compilation)
        run: pnpm --filter=@app/console build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCI-PLACEHOLDER-KEY
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000'

  # ─────────────────────────────────────────────────────────────
  # Mobile CI (Flutter) — independent of the node jobs
  # ─────────────────────────────────────────────────────────────
  mobile:
    name: Mobile — Analyze, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ─────────────────────────────────────────────────────────────
  # Shared UI package CI
  # ─────────────────────────────────────────────────────────────
  ui:
    name: UI — Lint, Type-check
    runs-on: ubuntu-latest # runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter=@app/ui lint

      - name: Type-check
        run: pnpm --filter=@app/ui type-check
