# Deploys internal developer docs to GitHub Pages using MkDocs Material
# Triggered on push to develop when docs/ or mkdocs.yml changes

name: Deploy Internal Docs

on:
  # push:
  #   branches: [develop]
  #   paths:
  #     - 'docs/**'
  #     - 'mkdocs.yml'
  #     - '.github/workflows/docs.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Internal Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build

      - name: Copy QA reports into site
        run: |
          mkdir -p site/qa/reports
          # Copy all timestamped reports
          for f in docs/overrides/qa-reports/*.html; do
            [ -f "$f" ] && cp "$f" site/qa/reports/ && echo "✓ Copied $(basename $f)"
          done
          # Copy latest as qa-report.html at root (direct link)
          if [ -f docs/overrides/qa-report.html ]; then
            cp docs/overrides/qa-report.html site/qa-report.html
          fi
          # Generate report history index
          cat > site/qa/reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Quality Gate — Report History</title></head>
          <body style="font-family:-apple-system,system-ui,sans-serif;background:#0a0a0a;color:#e5e5e5;max-width:700px;margin:0 auto;padding:24px">
          <a href="../" style="color:#737373;text-decoration:none;font-size:13px">← Back to Quality Gate</a>
          <h1 style="color:#fff;border-bottom:1px solid #333;padding-bottom:12px;margin-top:16px">Report History</h1>
          <p style="color:#737373">All Quality Gate runs. Click to view details.</p>
          <div id="reports"></div>
          <script>const reports = [
          EOF
          for f in $(ls -1t site/qa/reports/*.html 2>/dev/null | grep -v index.html); do
            name=$(basename "$f" .html)
            echo "{ name: '$name', file: '$name.html' }," >> site/qa/reports/index.html
          done
          cat >> site/qa/reports/index.html << 'EOF'
          ];
          const c = document.getElementById('reports');
          if (!reports.length) { c.innerHTML = '<p style="color:#737373">No reports yet.</p>'; }
          else { reports.forEach((r, i) => {
            c.innerHTML += `<a href="${r.file}" style="display:block;padding:16px;margin:8px 0;background:#171717;border:1px solid ${i===0?'#22c55e':'#262626'};border-radius:8px;text-decoration:none;color:#e5e5e5">
            <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:600">${r.name}</span>
            ${i===0?'<span style="padding:4px 12px;border-radius:999px;font-size:12px;background:#22c55e20;color:#22c55e">LATEST</span>':''}
            </div></a>`;
          }); }
          </script></body></html>
          EOF
          echo "✓ Report history index generated"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
